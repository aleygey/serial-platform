name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release metadata
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Match tag to Cargo version
        run: |
          version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"
          test "v${version}" = "${GITHUB_REF_NAME}"

  windows:
    name: Windows x86_64
    runs-on: windows-latest
    needs: verify
    env:
      RUSTFLAGS: -C target-feature=+crt-static

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Build Windows binaries
        run: cargo build --release --locked -p seriald -p serialctl -p serial-mcp

      - name: Smoke-test binaries
        shell: pwsh
        run: |
          .\target\release\seriald.exe --version
          .\target\release\serialctl.exe --version
          .\target\release\serial-mcp.exe --version

      - name: Package Windows release
        shell: pwsh
        run: |
          $packageName = "serial-platform-${env:GITHUB_REF_NAME}-windows-x86_64"
          $packageDir = Join-Path "dist" $packageName
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "target\release\seriald.exe" $packageDir
          Copy-Item "target\release\serialctl.exe" $packageDir
          Copy-Item "target\release\serial-mcp.exe" $packageDir
          Copy-Item "adapters" $packageDir -Recurse
          Copy-Item "README.md" $packageDir
          Copy-Item "DOCUMENTATION.md" $packageDir
          Copy-Item "LICENSE" $packageDir
          Compress-Archive -Path $packageDir -DestinationPath "dist\$packageName.zip"

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  linux:
    name: Linux x86_64 (static musl)
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl build tools
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Test workspace natively
        run: cargo test --workspace --locked

      - name: Build static Linux clients
        run: cargo build --release --locked -p serialctl -p serial-mcp --target x86_64-unknown-linux-musl

      - name: Smoke-test Linux client
        run: |
          binary=./target/x86_64-unknown-linux-musl/release/serialctl
          "${binary}" --version
          mcp_binary=./target/x86_64-unknown-linux-musl/release/serial-mcp
          "${mcp_binary}" --version
          for candidate in "${binary}" "${mcp_binary}"; do
            if readelf -d "${candidate}" | grep -q '(NEEDED)'; then
              echo "Linux release unexpectedly contains a dynamic dependency: ${candidate}" >&2
              exit 1
            fi
          done

      - name: Package Linux client
        run: |
          package_name="serial-platform-${GITHUB_REF_NAME}-linux-x86_64-musl"
          package_dir="dist/${package_name}"
          mkdir -p "${package_dir}"
          install -m 0755 target/x86_64-unknown-linux-musl/release/serialctl "${package_dir}/serialctl"
          install -m 0755 target/x86_64-unknown-linux-musl/release/serial-mcp "${package_dir}/serial-mcp"
          cp -r README.md DOCUMENTATION.md LICENSE adapters "${package_dir}/"
          tar -C dist -czf "dist/${package_name}.tar.gz" "${package_name}"

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-musl
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum *.zip *.tar.gz > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --title "Serial Platform ${GITHUB_REF_NAME}"
          --generate-notes
